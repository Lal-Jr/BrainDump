# fly.toml app configuration file generated for braindump-spring-sun-9859 on 2026-03-14T20:25:23+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'braindump-spring-sun-9859'
primary_region = 'sjc'

[build]

[env]
  DATA_DIR = '/data'
  PORT = '3001'

[[mounts]]
  source = 'braindump_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
